name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install TypeScript workspace dependencies
        run: pnpm install --filter ts-mcp-server... --filter @py-type/shared-schemas...

      - name: Lint TypeScript reference server
        run: pnpm --filter ts-mcp-server lint

      - name: Test TypeScript reference server
        run: pnpm --filter ts-mcp-server test

  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python reference server
        working-directory: apps/py-mcp-server
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Python tests
        working-directory: apps/py-mcp-server
        run: pytest
