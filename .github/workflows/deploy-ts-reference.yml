name: Deploy TS Reference Server

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/ts-mcp-server/**"
      - "packages/shared-schemas/**"
      - ".github/workflows/deploy-ts-reference.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --filter ts-mcp-server... --filter @py-type/shared-schemas...

      - name: Deploy with Wrangler
        working-directory: apps/ts-mcp-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm deploy
